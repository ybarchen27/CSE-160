<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Draw a red vector on black canvas</title>
    </head>

    <body onload="main()">
        <canvas id="example" width="400" height="400">
        Please use a browser that supports "canvas"
        </canvas>

            <br><br>

        <label for="vector1">v1:</label>
        <label for="xCoord1">x:</label> <!-- input for x coordinate -->
        <input type="number" id="xCoord1" value="0" step="any">

        <label for="yCoord1">y:</label> <!-- input for y coordinate -->
        <input type="number" id="yCoord1" value="0" step="any">

        <button onclick="handleDrawEvent()">Draw</button>

            <br><br>

        <label for="vector2">v2:</label>
        <label for="xCoord2">x:</label> <!-- input for x coordinate -->
        <input type="number" id="xCoord2" value="0" step="any">

        <label for="yCoord2">y:</label> <!-- input for y coordinate -->
        <input type="number" id="yCoord2" value="0" step="any">

            <br><br>

        <label for="operation">Operation:</label>
        <select id="operation">
            <option value="add">Add</option>
            <option value="sub">Subtract</option>
            <option value="mul">Multiply</option>
            <option value="div">Divide</option>
            <option value="mag">Magnitude</option>
            <option value="norm">Normalize</option>
            <option value="ang">Angle between</option>
            <option value="area">Area</option>
        </select>

        <label for="scalar">Scalar:</label> <!-- input for scalar -->
        <input type="number" id="scalar" value="0" step="any">

        <button onclick="handleDrawOperationEvent()">Draw</button>

        <script src="lib/cuon-matrix-cse160.js"></script>         <!-- Load your JS file -->

        <script src="asgn0.js"></script>
    </body>
</html>
