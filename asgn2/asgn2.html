<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assignment 2: Painting</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      font-size: 13px;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px;
      gap: 10px;
    }

    /* ---- Left control panel ---- */
    #controls {
      width: 160px;
      background: #ddd;
      border: 1px solid #aaa;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #controls h3 {
      font-size: 13px;
      text-align: center;
      border-bottom: 1px solid #aaa;
      padding-bottom: 4px;
    }
    .section { display: flex; flex-direction: column; gap: 4px; }
    .section > label { font-weight: bold; }
    .row { display: flex; align-items: center; gap: 4px; }
    .row .lbl { width: 14px; font-weight: bold; flex-shrink: 0; }
    .row input[type=range] { flex: 1; min-width: 0; }
    .row .val { width: 24px; text-align: right; flex-shrink: 0; }

    button {
      width: 100%;
      padding: 4px;
      font-size: 12px;
      cursor: pointer;
      background: #eee;
      border: 1px solid #999;
    }
    button.active {
      background: #aad4f5;
      border-color: #555;
      font-weight: bold;
    }
    button:hover { background: #ccc; }
    button.active:hover { background: #88c0e8; }

    #btn_paint { background: #e8f5e9; }
    #btn_paint.active { background: #66bb6a; color: #fff; border-color: #388e3c; }

    #clearBtn { background: #fcc; border-color: #999; }
    #clearBtn:hover { background: #f88; }

    #colorBox {
      height: 20px;
      border: 1px solid #888;
      margin-top: 2px;
    }

    canvas {
      border: 1px solid #999;
      display: block;
      background: #000;
      cursor: crosshair;
    }

    .note {
      font-size: 10px;
      color: #777;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="controls">
    <h3>Bunny Controls</h3>

    <label>Global Y Rotation: <span id="yRotVal">0</span></label>
    <input type="range" id="yRotSlider" min="-180" max="180" value="0"
      oninput="g_angleY=+this.value; document.getElementById('yRotVal').textContent=this.value; renderScene();">

    <label>Global X Rotation: <span id="xRotVal">30</span></label>
    <input type="range" id="xRotSlider" min="-90" max="90" value="30"
      oninput="g_angleX=+this.value; document.getElementById('xRotVal').textContent=this.value; renderScene();">

    <label>Ear 1 Angle: <span id="ear1Val">0</span></label>
    <input type="range" id="ear1Slider" min="-45" max="45" value="0"
      oninput="g_ear1Angle=+this.value; document.getElementById('ear1Val').textContent=this.value; renderScene();">

    <label>Ear 2 Angle: <span id="ear2Val">0</span></label>
    <input type="range" id="ear2Slider" min="-45" max="45" value="0"
      oninput="g_ear2Angle=+this.value; document.getElementById('ear2Val').textContent=this.value; renderScene();">

    <label>Ear Tip Angle: <span id="ear3Val">0</span></label>
    <input type="range" id="ear3Slider" min="-45" max="45" value="0"
      oninput="g_ear3Angle=+this.value; document.getElementById('ear3Val').textContent=this.value; renderScene();">

    <button onclick="toggleAnimation()">Toggle Animation</button>
  </div>

  <canvas id="webgl" width="400" height="400"></canvas>
  <script src="asgn2.js"></script>
</body>
</html>
